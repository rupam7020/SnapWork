<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SnapWork Sign Up</title>

<link rel="stylesheet" href="../static/clientsignup.css">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="topbar">
<div class="logo">Snap<span>Work</span></div>

<div class="top-links">
Looking for work?
<a href="#">Apply as talent</a>
</div>
</header>


<div class="container">

<h1>Sign up to hire talent</h1>

<div class="social-buttons">

<button class="apple-btn">
<i class="fa-brands fa-apple"></i>
Continue with Apple
</button>

<button class="google-btn">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

Continue with Google

</button>

</div>

<div class="divider">
<span>or</span>
</div>

<form method="POST" action="/signup/client">

<div class="name-row">

<div class="input-group">
<label>First name</label>
<input type="text" name="first_name" required>
</div>

<div class="input-group">
<label>Last name</label>
<input type="text" name="last_name" required>
</div>

</div>


<div class="input-group">
<label>Work email address</label>
<input type="email" name="email" required>
</div>


<div class="input-group">
<label>Password</label>

<div class="password-field">

<input
type="password"
name="password"
placeholder="Password (8 or more characters)"
required
>

<i class="fa-regular fa-eye"></i>

</div>

</div>


<div class="input-group">

<label>Country</label>

<select name="country">

<option value="India">India</option>
<option value="USA">USA</option>
<option value="UK">UK</option>
<option value="Canada">Canada</option>

</select>

</div>



<div class="checkbox">
<input type="checkbox" checked>

<p>
Send me emails with tips on how to find talent that fits my needs.
</p>
</div>


<div class="checkbox">
<input type="checkbox" required>

<p>
Yes, I understand and agree to the
<a href="#">Terms of Service</a>
including the
<a href="#">User Agreement</a>
and
<a href="#">Privacy Policy</a>.
</p>

</div>


<button type="submit" class="create-btn">
Create my account
</button>

<p class="login-text">
Already have an account?
<a href="/login">Log In</a>
</p>

</form>

</div>

</body>
</html>
