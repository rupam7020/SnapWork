<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SnapWork Student Sign Up</title>

<link rel="stylesheet" href="../css/studentsignup.css">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header class="topbar">
<div class="logo">Snap<span>Work</span></div>

<div class="top-links">
Looking to hire?
<a href="#">Hire talent</a>
</div>
</header>


<div class="container">

<h1>Sign up as a Student</h1>

<div class="social-buttons">

<button class="apple-btn">
<i class="fa-brands fa-apple"></i>
Continue with Apple
</button>

<button class="google-btn">

<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">

Continue with Google

</button>

</div>

<div class="divider">
<span>or</span>
</div>


<form>

<div class="name-row">

<div class="input-group">
<label>First name</label>
<input type="text">
</div>

<div class="input-group">
<label>Last name</label>
<input type="text">
</div>

</div>


<div class="input-group">
<label>Student email address</label>
<input type="email">
</div>


<div class="input-group">
<label>Password</label>

<div class="password-field">

<input type="password" placeholder="Password (8 or more characters)">

<i class="fa-regular fa-eye"></i>

</div>

</div>


<div class="input-group">
<label>University / College</label>
<input type="text" placeholder="Enter your college name">
</div>


<div class="input-group">
<label>Primary Skill</label>
<input type="text" placeholder="Example: Web Development, UI Design">
</div>


<div class="input-group">

<label>Country</label>

<select>
<option>India</option>
<option>USA</option>
<option>UK</option>
<option>Canada</option>
</select>

</div>



<div class="checkbox">
<input type="checkbox" checked>

<p>
Send me updates about internships, freelance work, and student opportunities.
</p>
</div>


<div class="checkbox">
<input type="checkbox">

<p>
Yes, I understand and agree to the
<a href="#">Terms of Service</a>
including the
<a href="#">User Agreement</a>
and
<a href="#">Privacy Policy</a>.
</p>

</div>


<button class="create-btn">Create my student account</button>


<p class="login-text">
Already have an account?
<a href="login.html">Log In</a>
</p>

</form>

</div>

</body>
</html>
