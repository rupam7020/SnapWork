<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Join SnapWork</title>
<link rel="stylesheet" href="../css/signup.css">
</head>

<body>

<header class="logo">
<h2>snapwork</h2>
</header>

<div class="signup-container">

<h1>Join as a client or freelancer</h1>

<form class="signup-form">

<!-- RADIO INPUTS -->

<input type="radio" name="role" id="client">
<input type="radio" name="role" id="freelancer">

<div class="cards">

<label for="client" class="card">
<div class="card-box">
<div class="radio"></div>
<div class="icon">👤</div>
<h3>I'm a client, hiring<br>for a project</h3>
</div>
</label>

<label for="freelancer" class="card">
<div class="card-box">
<div class="radio"></div>
<div class="icon">💼</div>
<h3>I'm a freelancer,<br>looking for work</h3>
</div>
</label>

</div>

<div class="buttons">

<a href="clientsignup.html" class="btn client-btn">Join as a Client</a>

<a href="studentsignup.html" class="btn freelancer-btn">Apply as a Freelancer</a>

</div>

<p class="login">
Already have an account? <a href="login.html">Log In</a>
</p>

</form>

</div>

</body>
</html>
