<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Makes page responsive on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SnapWork Login</title>

    <!-- Font Awesome CDN for icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Linking External CSS File -->
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

    <!-- Main Login Container -->
    <div class="login-container">

        <!-- SnapWork Logo -->
        <div class="logo">
            Snap<span>Work</span>
        </div>

        <!-- Login Title -->
        <h2>Log in to SnapWork</h2>

        <!-- Email / Username Input -->
        <input type="text" placeholder="Username or Email" class="input-box">

        <input type="text" placeholder="Password" class="input-box">

        <!-- Continue Button -->
        <button class="btn continue-btn">Continue</button>

        <!-- Divider Line -->
        <div class="divider">or</div>

    
    <!-- Google Login Button -->
    <button class="btn google-btn">
    <!-- Official colorful Google icon -->
    <img src="../assets/google-icon.png"
    class="google-icon">
    Continue with Google
    </button>



    <!-- Apple Login Button -->
    <button class="btn apple-btn">
    <i class="fa-brands fa-apple"></i>
    Continue with Apple
    </button>

    <!-- Signup Section -->
        <div class="signup">
            <p>Don't have an SnapWork account?</p>
            <a href="#">Sign Up</a>
        </div>

    </div>

</body>

</html>
